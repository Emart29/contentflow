<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ContentFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-100 text-gray-950">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-5 px-4 py-5 sm:px-6 lg:px-8">
      <header class="flex flex-col gap-3 rounded-md bg-white p-5 shadow-sm sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="text-2xl font-bold tracking-normal">ContentFlow</h1>
          <p class="mt-1 text-sm text-gray-600">Blog -> Social Posts Agent</p>
        </div>
        <span id="providerBadge" class="w-fit rounded-full bg-gray-100 px-3 py-1 text-sm font-medium text-gray-700">
          loading provider
        </span>
      </header>

      <section class="grid flex-1 grid-cols-1 gap-5 lg:grid-cols-3">
        <aside class="rounded-md bg-white p-5 shadow-sm lg:col-span-1">
          <form id="runForm" class="space-y-5">
            <label class="block">
              <span class="text-sm font-medium text-gray-800">Blog post URL</span>
              <input
                id="url"
                name="url"
                type="text"
                required
                class="mt-2 w-full rounded-md border border-gray-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
              />
            </label>

            <label class="block">
              <span class="text-sm font-medium text-gray-800">Client name</span>
              <input
                id="clientName"
                name="clientName"
                type="text"
                value="Test Client"
                class="mt-2 w-full rounded-md border border-gray-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
              />
            </label>

            <label class="block">
              <span class="text-sm font-medium text-gray-800">Brand voice</span>
              <textarea
                id="brandVoice"
                name="brandVoice"
                rows="3"
                placeholder="Professional, data-driven, direct"
                class="mt-2 w-full resize-y rounded-md border border-gray-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
              ></textarea>
            </label>

            <fieldset>
              <legend class="text-sm font-medium text-gray-800">Platforms</legend>
              <div class="mt-2 grid gap-2">
                <label class="flex items-center gap-2 text-sm text-gray-700">
                  <input type="checkbox" name="platforms" value="linkedin" checked class="h-4 w-4 rounded border-gray-300 text-blue-600" />
                  LinkedIn
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-700">
                  <input type="checkbox" name="platforms" value="twitter" checked class="h-4 w-4 rounded border-gray-300 text-blue-600" />
                  Twitter/X
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-700">
                  <input type="checkbox" name="platforms" value="instagram" checked class="h-4 w-4 rounded border-gray-300 text-blue-600" />
                  Instagram
                </label>
              </div>
            </fieldset>

            <label class="block">
              <span class="text-sm font-medium text-gray-800">Blocked terms</span>
              <input
                id="blockedTerms"
                name="blockedTerms"
                type="text"
                placeholder="competitor1, competitor2"
                class="mt-2 w-full rounded-md border border-gray-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
              />
            </label>

            <label class="flex items-center justify-between gap-3">
              <span class="text-sm font-medium text-gray-800">Require human review</span>
              <input id="requireHumanReview" type="checkbox" class="peer sr-only" />
              <span class="relative h-6 w-11 rounded-full bg-gray-300 transition peer-checked:bg-blue-600 after:absolute after:left-1 after:top-1 after:h-4 after:w-4 after:rounded-full after:bg-white after:transition peer-checked:after:translate-x-5"></span>
            </label>

            <button
              id="runButton"
              type="submit"
              class="flex w-full items-center justify-center gap-2 rounded-md bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-blue-300"
            >
              <span id="runSpinner" class="hidden h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
              <span id="runButtonText">Run Agent</span>
            </button>
          </form>
        </aside>

        <section class="rounded-md bg-white p-5 shadow-sm lg:col-span-2">
          <div id="emptyState" class="flex min-h-96 items-center justify-center rounded-md border border-dashed border-gray-300 bg-gray-50 text-sm text-gray-500">
            Run the agent to see results
          </div>

          <div id="resultsView" class="hidden space-y-5">
            <div id="statusBanner" class="rounded-md px-4 py-3 text-sm font-semibold transition-colors duration-300"></div>

            <div class="grid gap-3 rounded-md bg-gray-50 p-4 text-sm text-gray-700 sm:grid-cols-2 lg:grid-cols-4">
              <div>
                <div class="font-medium text-gray-500">Run</div>
                <div id="metaRunId" class="mt-1 font-mono text-xs text-gray-900"></div>
              </div>
              <div>
                <div class="font-medium text-gray-500">Provider</div>
                <div id="metaProvider" class="mt-1 text-gray-900"></div>
              </div>
              <div>
                <div class="font-medium text-gray-500">Model</div>
                <div id="metaModel" class="mt-1 truncate text-gray-900"></div>
              </div>
              <div>
                <div class="font-medium text-gray-500">Duration</div>
                <div id="metaDuration" class="mt-1 text-gray-900"></div>
              </div>
            </div>

            <div id="postsGrid" class="grid grid-cols-1 gap-4 xl:grid-cols-3"></div>

            <section id="flagsSection" class="hidden space-y-3">
              <h2 class="text-base font-semibold">Flags</h2>
              <div id="flagsList" class="space-y-3"></div>
            </section>

            <details class="rounded-md bg-gray-50 p-4">
              <summary class="cursor-pointer text-sm font-semibold text-gray-800">Recent Runs</summary>
              <div class="mt-4 overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                  <thead class="border-b border-gray-200 text-xs uppercase text-gray-500">
                    <tr>
                      <th class="py-2 pr-4">Time</th>
                      <th class="py-2 pr-4">URL</th>
                      <th class="py-2 pr-4">Status</th>
                      <th class="py-2 pr-4">Posts</th>
                      <th class="py-2 pr-4">Flags</th>
                      <th class="py-2 pr-4">Provider</th>
                      <th class="py-2">Duration</th>
                    </tr>
                  </thead>
                  <tbody id="recentRunsBody" class="divide-y divide-gray-200"></tbody>
                </table>
              </div>
            </details>
          </div>
        </section>
      </section>
    </main>

    <script src="./api_client.js"></script>
    <script>
      const limits = {
        linkedin: 1300,
        twitter: 270,
        instagram: 300,
      };

      const platformLabels = {
        linkedin: "LinkedIn",
        twitter: "Twitter/X",
        instagram: "Instagram",
      };

      const form = document.getElementById("runForm");
      const runButton = document.getElementById("runButton");
      const runButtonText = document.getElementById("runButtonText");
      const runSpinner = document.getElementById("runSpinner");
      const emptyState = document.getElementById("emptyState");
      const resultsView = document.getElementById("resultsView");
      const providerBadge = document.getElementById("providerBadge");

      function statusClasses(status) {
        if (status === "approved") return "bg-green-100 text-green-800";
        if (status === "review") return "bg-yellow-100 text-yellow-800";
        return "bg-red-100 text-red-800";
      }

      function statusLabel(status) {
        if (status === "approved") return "✓ Approved";
        if (status === "review") return "⚠ Review Required";
        return "✗ Escalated";
      }

      function confidenceClasses(confidence) {
        if (confidence === "high") return "bg-green-100 text-green-800";
        if (confidence === "medium") return "bg-yellow-100 text-yellow-800";
        return "bg-red-100 text-red-800";
      }

      function charClasses(count, limit) {
        const ratio = count / limit;
        if (ratio <= 0.9) return "bg-green-100 text-green-800";
        if (ratio <= 1) return "bg-yellow-100 text-yellow-800";
        return "bg-red-100 text-red-800";
      }

      function truncate(value, length = 28) {
        if (!value) return "";
        return value.length > length ? `${value.slice(0, length)}...` : value;
      }

      function setLoading(isLoading) {
        runButton.disabled = isLoading;
        runSpinner.classList.toggle("hidden", !isLoading);
        runButtonText.textContent = isLoading ? "Running..." : "Run Agent";
      }

      function collectPayload() {
        const platforms = Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map((input) => input.value);
        const blockedTerms = document
          .getElementById("blockedTerms")
          .value.split(",")
          .map((term) => term.trim())
          .filter(Boolean);

        return {
          url: document.getElementById("url").value.trim(),
          client_name: document.getElementById("clientName").value.trim(),
          brand_voice: document.getElementById("brandVoice").value.trim() || "Professional, data-driven, direct",
          platforms,
          blocked_terms: blockedTerms,
          require_human_review: document.getElementById("requireHumanReview").checked,
        };
      }

      function renderPost(post) {
        const limit = limits[post.platform] || 1300;
        const card = document.createElement("article");
        card.className = "rounded-md border border-gray-200 bg-white p-4 shadow-sm";
        card.innerHTML = `
          <div class="flex items-center justify-between gap-3">
            <h3 class="text-sm font-semibold">${platformLabels[post.platform] || post.platform}</h3>
            <span class="rounded-full px-2 py-1 text-xs font-medium ${confidenceClasses(post.confidence)}">${post.confidence}</span>
          </div>
          <textarea readonly class="mt-3 h-48 w-full resize-none rounded-md border border-gray-200 bg-gray-50 p-3 text-sm leading-6 text-gray-800">${post.content}</textarea>
          <div class="mt-3 flex flex-wrap items-center justify-between gap-2">
            <span class="rounded-full px-2 py-1 text-xs font-medium ${charClasses(post.char_count, limit)}">${post.char_count} / ${limit}</span>
            <button type="button" class="copy-btn rounded-md border border-gray-300 px-3 py-1.5 text-xs font-semibold text-gray-700 transition hover:bg-gray-100">Copy</button>
          </div>
          <div class="mt-3 text-xs text-gray-500">${(post.hashtags || []).join(" ")}</div>
        `;

        card.querySelector(".copy-btn").addEventListener("click", async (event) => {
          await navigator.clipboard.writeText(post.content);
          const button = event.currentTarget;
          button.textContent = "Copied ✓";
          setTimeout(() => {
            button.textContent = "Copy";
          }, 1200);
        });

        return card;
      }

      function renderFlags(flags) {
        const section = document.getElementById("flagsSection");
        const list = document.getElementById("flagsList");
        list.innerHTML = "";
        section.classList.toggle("hidden", !flags.length);

        flags.forEach((flag) => {
          const card = document.createElement("div");
          const severe = flag.reason.includes("DETECTED") || flag.reason.includes("FAILED") || flag.reason.includes("ERROR");
          card.className = `rounded-md border p-4 text-sm ${severe ? "border-red-200 bg-red-50 text-red-900" : "border-yellow-200 bg-yellow-50 text-yellow-900"}`;
          card.innerHTML = `
            <div class="flex flex-wrap items-center gap-2">
              <span class="rounded-full bg-white px-2 py-1 text-xs font-medium">${flag.stage}</span>
              <strong>${flag.reason}</strong>
            </div>
            <p class="mt-2 text-sm">${flag.detail}</p>
          `;
          list.appendChild(card);
        });
      }

      function renderResult(result) {
        emptyState.classList.add("hidden");
        resultsView.classList.remove("hidden");

        const statusBanner = document.getElementById("statusBanner");
        statusBanner.className = `rounded-md px-4 py-3 text-sm font-semibold transition-colors duration-300 ${statusClasses(result.status)}`;
        statusBanner.textContent = statusLabel(result.status);

        document.getElementById("metaRunId").textContent = truncate(result.run_id, 18);
        document.getElementById("metaProvider").textContent = result.llm_provider || "unknown";
        document.getElementById("metaModel").textContent = result.llm_model || "unknown";
        document.getElementById("metaDuration").textContent = `${(result.duration_seconds || 0).toFixed(2)}s`;

        const postsGrid = document.getElementById("postsGrid");
        postsGrid.innerHTML = "";
        (result.posts || []).forEach((post) => postsGrid.appendChild(renderPost(post)));
        renderFlags(result.flags || []);
      }

      function renderRecentRuns(runs) {
        const body = document.getElementById("recentRunsBody");
        body.innerHTML = "";
        runs.forEach((run) => {
          const row = document.createElement("tr");
          row.className = "text-gray-700";
          row.innerHTML = `
            <td class="py-2 pr-4 whitespace-nowrap">${new Date(run.created_at).toLocaleString()}</td>
            <td class="py-2 pr-4 max-w-56 truncate">${run.url}</td>
            <td class="py-2 pr-4"><span class="rounded-full px-2 py-1 text-xs font-medium ${statusClasses(run.status)}">${run.status}</span></td>
            <td class="py-2 pr-4">${run.posts_generated}</td>
            <td class="py-2 pr-4">${run.flags_count}</td>
            <td class="py-2 pr-4">${run.llm_provider || "unknown"}</td>
            <td class="py-2">${run.duration_seconds ? `${run.duration_seconds.toFixed(2)}s` : ""}</td>
          `;
          body.appendChild(row);
        });
      }

      async function refreshRecentRuns() {
        try {
          renderRecentRuns(await window.ContentFlowAPI.getRecentRuns(10));
        } catch {
          renderRecentRuns([]);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setLoading(true);
        try {
          const result = await window.ContentFlowAPI.runPipeline(collectPayload());
          renderResult(result);
          await refreshRecentRuns();
        } catch (error) {
          renderResult({
            status: "escalated",
            run_id: "request-failed",
            llm_provider: "",
            llm_model: "",
            duration_seconds: 0,
            posts: [],
            flags: [{ stage: "api", reason: "REQUEST_FAILED", detail: error.message }],
          });
        } finally {
          setLoading(false);
        }
      });

      async function boot() {
        try {
          const health = await window.ContentFlowAPI.getHealth();
          providerBadge.textContent = `${health.llm_provider} · ${health.llm_model}`;
        } catch {
          providerBadge.textContent = "provider unavailable";
        }
        await refreshRecentRuns();
      }

      boot();
    </script>
  </body>
</html>
