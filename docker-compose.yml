services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./contentflow.db:/app/contentflow.db
    env_file: .env
    restart: unless-stopped

  ui:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
